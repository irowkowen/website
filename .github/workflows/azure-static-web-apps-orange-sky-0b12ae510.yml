name: Azure Static Web Apps CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - main

jobs:
  build_and_deploy_job:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    name: Build and Deploy Job
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v3
        with:
          submodules: true
          lfs: false

      # NOTE:
      # This repo is a plain static HTML site (no package.json, no build step).
      # Oryx will try to detect/build Node apps by default and will fail.
      # skip_app_build=true tells Azure SWA to upload the files as-is from app_location.
      - name: Build And Deploy
        id: builddeploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_ORANGE_SKY_OB12AE510 }}
          action: "upload"

          # Repository/Build Configurations
          app_location: "/"        # Static site is in repo root (index.html)
          api_location: ""         # No Azure Functions yet
          output_location: ""      # No build output directory
          skip_app_build: true     # IMPORTANT: do not run Oryx build

  close_pull_request_job:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close Pull Request Job
    steps:
      - name: Close Pull Request
        id: closepullrequest
        uses: Azure/static-web-apps-deploy@v1
        with:
          action: "close"






